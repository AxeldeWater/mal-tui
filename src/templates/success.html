<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login successful</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07080a; --ink:#cdeee6; --rim:#5ef0ff; --muted:#5d7b78;
    --glow-cyan:rgba(94,240,255,.55);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink); font-family:"Zen Old Mincho",serif;
    min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
    overflow:hidden; position:relative;
  }
  body::after{ content:""; position:absolute; inset:0; z-index:3; pointer-events:none;
    background:radial-gradient(135% 120% at 50% 30%, transparent 60%, rgba(0,0,0,.7) 100%);}

  .stage{ position:relative; z-index:2; display:flex; flex-direction:column;
    align-items:center; gap:clamp(1rem,4vh,2.4rem); padding:clamp(2.5vh,5vh,6vh) 5vw 0;
    text-align:center;}

  /* title block — now at the top of the page */
  .copy{ display:flex; flex-direction:column; align-items:center; gap:.55rem;
    animation:fadeDown 1.2s ease .2s both;}
  .kicker{ font-size:clamp(.7rem,1.5vw,.88rem); letter-spacing:.55em; text-indent:.55em;
    color:var(--rim); text-shadow:0 0 10px var(--glow-cyan);}
  .title{ font-size:clamp(1.6rem,4.6vw,2.7rem); font-weight:700; letter-spacing:.04em;
    color:#eafff8; text-shadow:0 0 18px rgba(94,240,255,.4);}
  .note{ font-size:clamp(.82rem,1.8vw,1rem); color:var(--muted); letter-spacing:.04em;}

  .tree-wrap{ animation:rise 1.8s cubic-bezier(.2,.7,.2,1) .35s both; }
  .tree{ width:clamp(180px,27vh,297px); height:auto; display:block;
    transform:scaleY(-1);                 /* flipped upside down */
    /* neon glow that follows the tree's silhouette (alpha), not a box */
    filter:
      drop-shadow(0 0 5px rgba(120,250,255,.55))
      drop-shadow(0 0 16px rgba(70,210,190,.45))
      drop-shadow(0 0 38px rgba(40,150,140,.30));
    animation:breathe 7s ease-in-out 2s infinite;}
  /* the glow gently swells, like the tree is lit from within */
  @keyframes breathe{
    0%,100%{ filter:
      drop-shadow(0 0 4px rgba(120,250,255,.45))
      drop-shadow(0 0 13px rgba(70,210,190,.38))
      drop-shadow(0 0 30px rgba(40,150,140,.24)); }
    50%{ filter:
      drop-shadow(0 0 7px rgba(150,255,255,.7))
      drop-shadow(0 0 22px rgba(80,225,205,.55))
      drop-shadow(0 0 52px rgba(55,180,165,.4)); } }

  @keyframes rise{ from{opacity:0; transform:translateY(-14px)}
                   to{opacity:1; transform:translateY(0)} }
  @keyframes fadeDown{ from{opacity:0; transform:translateY(-10px)}
                       to{opacity:1; transform:translateY(0)} }
  @media (prefers-reduced-motion:reduce){ .tree,.tree-wrap,.copy{animation:none;opacity:1} }
</style>
</head>
<body>
  <main class="stage">
    <div class="copy">
      <span class="kicker">ログイン成功</span>
      <h1 class="title">Login successful</h1>
      <p class="note">You may now close this window and return to the terminal.</p>
    </div>
    <div class="tree-wrap">
      <img class="tree" alt="A neon-lit bonsai tree" src="/image">
    </div>
  </main>
</body>
</html>
